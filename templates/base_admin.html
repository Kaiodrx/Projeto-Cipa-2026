{% extends 'base.html' %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-admin">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('admin.dashboard') }}">
            <img src="{{ url_for('static', filename='logo-neoenergia.png') }}"
                 alt="Neoenergia Brasília"
                 style="height:38px;width:38px;object-fit:contain;border-radius:8px;">
            Neoenergia Brasília
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin" style="color:rgba(255,255,255,.6)">
            <i class="bi bi-list fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navAdmin">
            <div class="navbar-nav ms-auto d-flex gap-1 align-items-center">
                <a class="nav-link {% if request.endpoint == 'admin.candidatos' %}active{% endif %}"
                   href="{{ url_for('admin.candidatos') }}">
                    <i class="bi bi-people"></i> Candidatos
                </a>
                <a class="nav-link {% if request.endpoint == 'admin.funcionarios' %}active{% endif %}"
                   href="{{ url_for('admin.funcionarios') }}">
                    <i class="bi bi-person-badge"></i> Funcionários
                </a>
                <a class="nav-link {% if request.endpoint == 'admin.gerenciar_eleicao' %}active{% endif %}"
                   href="{{ url_for('admin.gerenciar_eleicao') }}">
                    <i class="bi bi-ballot"></i> Eleição
                </a>
                <a class="nav-link {% if request.endpoint == 'admin.participacao' %}active{% endif %}"
                   href="{{ url_for('admin.participacao') }}">
                    <i class="bi bi-person-check"></i> Participação
                </a>
                <a class="nav-link {% if request.endpoint == 'admin.resultado' %}active{% endif %}"
                   href="{{ url_for('admin.resultado') }}">
                    <i class="bi bi-bar-chart"></i> Resultado
                </a>
                <a class="nav-link {% if request.endpoint in ('admin.historico', 'admin.ver_historico') %}active{% endif %}"
                   href="{{ url_for('admin.historico') }}">
                    <i class="bi bi-archive"></i> Histórico
                </a>
                <a class="nav-link nav-link-danger ms-2" href="{{ url_for('admin.logout_admin') }}">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </a>
            </div>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
{% block admin_content %}{% endblock %}
{% endblock %}

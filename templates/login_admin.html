{% extends 'base.html' %}
{% block title %}Acesso Administrativo — CIPA 2026{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:80vh;align-items:center;">
    <div class="col-md-4 col-sm-10">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                 style="width:56px;height:56px;background:#eff6ff;">
                <i class="bi bi-shield-lock text-primary" style="font-size:1.5rem;"></i>
            </div>
            <h4 class="fw-bold mb-1">Acesso Administrativo</h4>
            <p class="text-muted" style="font-size:.85rem;">Eleição CIPA 2026</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-arrow-right-circle"></i> Entrar
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="{{ url_for('home') }}" class="text-muted text-decoration-none" style="font-size:.825rem;">
                <i class="bi bi-arrow-left"></i> Voltar ao início
            </a>
        </div>

    </div>
</div>
{% endblock %}

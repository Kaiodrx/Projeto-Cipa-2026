{% extends 'base.html' %}
{% block title %}Voto Confirmado — CIPA 2026{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:80vh;align-items:center;">
    <div class="col-md-5 col-sm-10 text-center">

        <div class="card p-2">
            <div class="card-body py-5">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4"
                     style="width:80px;height:80px;background:#ecfdf5;">
                    <i class="bi bi-patch-check-fill text-success" style="font-size:2.5rem;"></i>
                </div>
                <h4 class="fw-bold text-success mb-2">Voto registrado!</h4>
                <p class="text-muted mb-4">
                    Seu voto foi computado com sucesso e de forma sigilosa.<br>
                    Obrigado por participar da Eleição CIPA 2026.
                </p>
                <a href="{{ url_for('home') }}" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-house"></i> Voltar ao início
                </a>
            </div>
        </div>

    </div>
</div>
{% endblock %}

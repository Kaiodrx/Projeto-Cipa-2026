{% extends 'base.html' %}
{% block title %}Voto Confirmado{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow border-success">
            <div class="card-body p-5">
                <i class="bi bi-patch-check-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3 text-success">Voto registrado!</h3>
                <p class="text-muted">Seu voto foi computado com sucesso. Obrigado por participar!</p>
                <a href="{{ url_for('login_votacao') }}" class="btn btn-outline-secondary mt-2">
                    <i class="bi bi-house"></i> Voltar ao início
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

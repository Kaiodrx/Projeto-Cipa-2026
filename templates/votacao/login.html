{% extends 'base.html' %}
{% block title %}Eleição CIPA 2026 — Votação{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:80vh;align-items:center;">
    <div class="col-md-5 col-sm-10">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                 style="width:56px;height:56px;background:#e6f7ee;">
                <i class="bi bi-ballot-heart" style="font-size:1.5rem;color:#00AA44;"></i>
            </div>
            <h4 class="fw-bold mb-1">Eleição CIPA 2026</h4>
            <p class="text-muted" style="font-size:.875rem;">Informe sua matrícula e selecione sua unidade</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Sua matrícula</label>
                        <input type="text" name="matricula" class="form-control form-control-lg text-center"
                               placeholder="Ex: 00123" required autofocus
                               style="font-size:1.3rem;letter-spacing:.1em;font-weight:600;">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Sua unidade</label>
                        <select name="unidade" class="form-select form-select-lg" required>
                            <option value="" disabled selected>Selecione sua unidade...</option>
                            {% for u in unidades %}
                            <option value="{{ u }}">{{ u }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fs-6">
                        <i class="bi bi-arrow-right-circle"></i> Acessar votação
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="{{ url_for('home') }}" class="text-muted text-decoration-none" style="font-size:.825rem;">
                <i class="bi bi-arrow-left"></i> Voltar ao início
            </a>
        </div>
        <p class="text-center mt-2" style="color:#9ca3af;font-size:.75rem;">
            <i class="bi bi-lock-fill"></i> Voto sigiloso e seguro
        </p>

    </div>
</div>
{% endblock %}
